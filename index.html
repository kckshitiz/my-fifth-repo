<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Address Lookup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f4;
      color: #1c1c1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 800px; margin: 0 auto; }

    h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #5f5e5a; margin-bottom: 1.5rem; }

    .card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }

    .card-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; }

    label { font-size: 12px; color: #5f5e5a; display: block; margin-bottom: 4px; }

    input, textarea, select {
      width: 100%;
      padding: 8px 12px;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      color: #1c1c1a;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus { border-color: rgba(0,0,0,0.4); }
    textarea { resize: vertical; font-family: "SF Mono", "Fira Code", monospace; }

    .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }

    button {
      padding: 8px 16px;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      background: transparent;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: #1c1c1a;
      white-space: nowrap;
      transition: background 0.1s;
    }
    button:hover { background: #f1efe8; }
    button:active { transform: scale(0.98); }
    button.primary { background: #1c1c1a; color: #fff; border-color: #1c1c1a; }
    button.primary:hover { background: #3a3a38; }

    .hint { font-size: 12px; color: #5f5e5a; margin-top: 8px; }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 1rem;
    }
    .alert-error   { background: #fcebeb; border: 0.5px solid #f09595; color: #791f1f; }
    .alert-success { background: #eaf3de; border: 0.5px solid #97c459; color: #27500a; }

    .metrics { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
    .metric {
      background: #f1efe8;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      color: #5f5e5a;
    }
    .metric span { display: block; font-size: 20px; font-weight: 500; color: #1c1c1a; }
    .metric span.green { color: #27500a; }
    .metric span.red   { color: #791f1f; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left;
      font-weight: 500;
      font-size: 11px;
      color: #5f5e5a;
      padding: 6px 8px;
      border-bottom: 0.5px solid rgba(0,0,0,0.15);
    }
    tbody tr { border-bottom: 0.5px solid rgba(0,0,0,0.08); }
    tbody tr:hover { background: #f9f9f7; }
    td { padding: 8px; vertical-align: middle; }
    td.mono { font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge-found   { background: #eaf3de; color: #27500a; }
    .badge-missing { background: #fcebeb; color: #791f1f; }

    .missing-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .table-wrap { overflow-x: auto; }

    @media (prefers-color-scheme: dark) {
      body    { background: #18181a; color: #e8e6e0; }
      .card   { background: #222224; border-color: rgba(255,255,255,0.1); }
      input, textarea { background: #2a2a2c; border-color: rgba(255,255,255,0.15); color: #e8e6e0; }
      input:focus, textarea:focus { border-color: rgba(255,255,255,0.35); }
      button  { color: #e8e6e0; border-color: rgba(255,255,255,0.2); }
      button:hover { background: #2a2a2c; }
      button.primary { background: #e8e6e0; color: #18181a; border-color: #e8e6e0; }
      button.primary:hover { background: #cfcdc8; }
      .metric { background: #2a2a2c; color: #9e9d99; }
      .metric span { color: #e8e6e0; }
      .alert-error   { background: #2d1a1a; border-color: #a32d2d; color: #f09595; }
      .alert-success { background: #1a2d1a; border-color: #3b6d11; color: #c0dd97; }
      .subtitle, label, .hint, thead th { color: #9e9d99; }
      tbody tr:hover { background: #2a2a2c; }
      .badge-found   { background: #1a2d1a; color: #c0dd97; }
      .badge-missing { background: #2d1a1a; color: #f09595; }
    }
  </style>
</head>
<body>
<div class="container">

  <h1>IP Address Lookup</h1>
  <p class="subtitle">Check whether IP addresses exist in your GitHub allowlist record</p>

  <div id="loadStatus"></div>

  <div class="card">
    <p class="card-title">Search IP addresses</p>
    <label for="searchInput">Paste any text containing IPs — numbers, labels and extra text are ignored automatically</label>
    <textarea id="searchInput" rows="6"
      placeholder="20.104.201.101&#10;1.29k&#10;20.151.229.110&#10;423&#10;20.199.99.25&#10;344"></textarea>
    <p class="hint">Accepts raw IPs, mixed text with counts (e.g. "20.104.201.101 1.29k"), comma or newline separated — only valid IPs are extracted.</p>
    <div class="row" style="margin-top:10px">
      <button class="primary" onclick="search()">Search</button>
	   <button class="primary" onclick="window.location.href='https://github.com/kckshitiz/my-fifth-repo/edit/main/ip.txt'">
  IP
</button>
      <button onclick="clearAll()">Clear</button>
      <button id="downloadBtn" onclick="downloadAttackers()" style="
        display:none;background:#a32d2d;color:#fff;
        border-color:#a32d2d;margin-left:auto
      ">Download confirmed attackers (0)</button>
    </div>
  </div>

  <div class="metrics" id="metrics" style="display:none"></div>
  <div id="results"></div>

</div>
<script>
  const IP_FILE_URL = "https://raw.githubusercontent.com/kckshitiz/my-fifth-repo/refs/heads/main/ip.txt";
  let recordedIPs        = new Set();
  let loaded             = false;
  let confirmedAttackers = new Set();
  let markedSafe         = new Set();

  async function loadIPs() {
    const box = document.getElementById('loadStatus');
    try {
      const res  = await fetch(IP_FILE_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text  = await res.text();
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l && !l.startsWith('#'));
      recordedIPs = new Set(lines.map(l => l.toLowerCase()));
      loaded = true;
      box.innerHTML = `<div class="alert alert-success">
        Loaded <strong>${recordedIPs.size}</strong> IP record${recordedIPs.size !== 1 ? 's' : ''} from allowlist.
      </div>`;
    } catch (e) {
      box.innerHTML = `<div class="alert alert-error">Failed to load IP list: ${e.message}</div>`;
    }
  }

  window.addEventListener('DOMContentLoaded', loadIPs);

  function extractIPs(raw) {
    const ipRegex = /\b(25[0-5]|2[0-4]\d|1\d{2}|[1-9]\d|\d)\.(25[0-5]|2[0-4]\d|1\d{2}|[1-9]\d|\d)\.(25[0-5]|2[0-4]\d|1\d{2}|[1-9]\d|\d)\.(25[0-5]|2[0-4]\d|1\d{2}|[1-9]\d|\d)\b/g;
    const matches = raw.match(ipRegex) || [];
    return [...new Set(matches)];
  }

  function search() {
    const raw     = document.getElementById('searchInput').value;
    const results = document.getElementById('results');
    const metrics = document.getElementById('metrics');

    if (!raw.trim()) {
      results.innerHTML = '<div class="alert alert-error">Please enter at least one IP address.</div>';
      return;
    }
    if (!loaded) {
      results.innerHTML = '<div class="alert alert-error">IP list is still loading, please wait a moment and try again.</div>';
      return;
    }

    const ips     = extractIPs(raw);
    if (ips.length === 0) {
      results.innerHTML = '<div class="alert alert-error">No valid IP addresses found in the input.</div>';
      return;
    }

    const found   = ips.filter(ip => recordedIPs.has(ip.toLowerCase()));
    const missing = ips.filter(ip => !recordedIPs.has(ip.toLowerCase()));

  let activeFilter = 'all';

    metrics.style.display = 'flex';
    metrics.innerHTML = `
      <div class="metric" onclick="filterRows('all')" id="filter-all" style="cursor:pointer;outline:2px solid #1c1c1a;outline-offset:2px">
        <span>${ips.length}</span>IPs found in input</div>
      <div class="metric" onclick="filterRows('found')" id="filter-found" style="cursor:pointer">
        <span class="green">${found.length}</span>in record</div>
      <div class="metric" onclick="filterRows('missing')" id="filter-missing" style="cursor:pointer">
        <span class="red">${missing.length}</span>not in record</div>
    `;

    const rows = ips.map(ip => {
      confirmedAttackers.add(ip);
      const exists = recordedIPs.has(ip.toLowerCase());
      const safeId = `toggle-${ip.replace(/\./g,'-')}`;
      return `<tr>
        <td class="mono">
          <span style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            ${ip}
            <button
              onclick="copyIP('${ip}', this)"
              style="padding:2px 8px;font-size:11px;border-radius:6px;
                border:0.5px solid rgba(0,0,0,0.2);background:transparent;
                cursor:pointer;color:inherit;white-space:nowrap;min-width:48px">
              Copy
            </button>
            <button
              id="${safeId}"
              data-state="safe"
              onclick="toggleStatus('${ip}', this)"
              style="padding:2px 8px;font-size:11px;border-radius:6px;
                border:0.5px solid #a32d2d;background:#a32d2d;
                cursor:pointer;color:#fff;white-space:nowrap;min-width:80px">
              Attack
            </button>
          </span>
        </td>
        <td><span class="badge ${exists ? 'badge-found' : 'badge-missing'}">${exists ? 'Found' : 'Not found'}</span></td>
        <td style="font-size:12px;color:#5f5e5a">${exists
          ? 'IP exists in the allowlist record'
          : 'IP is NOT in the record — action may be required'}</td>
      </tr>`;
    }).join('');

    updateDownloadBtn();

    const missingSection = missing.length > 0 ? `
      <div class="card" style="margin-top:1rem">
        <p class="card-title" style="color:#791f1f">IPs not in record (${missing.length})</p>
        <div class="missing-list">
          ${missing.map(ip => `<span class="badge badge-missing">${ip}</span>`).join('')}
        </div>
      </div>` : `
      <div class="alert alert-success" style="margin-top:1rem">
        All ${ips.length} IP${ips.length !== 1 ? 's' : ''} found in the allowlist record.
      </div>`;

    results.innerHTML = `
      <div class="card" style="padding:0;overflow:hidden">
        <div class="table-wrap">
          <table>
            <thead><tr><th>IP Address</th><th>Status</th><th>Detail</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
      ${missingSection}
    `;
  }

  function filterRows(filter) {
    activeFilter = filter;

    // Update active outline on metric cards
    ['all','found','missing'].forEach(f => {
      const el = document.getElementById(`filter-${f}`);
      if (el) el.style.outline = f === filter ? '2px solid #1c1c1a' : 'none';
    });

    // Show/hide rows based on filter
    document.querySelectorAll('tbody tr').forEach(row => {
      const badge = row.querySelector('.badge');
      if (!badge) return;
      const isFound = badge.classList.contains('badge-found');
      if (filter === 'all')     row.style.display = '';
      else if (filter === 'found')   row.style.display = isFound  ? '' : 'none';
      else if (filter === 'missing') row.style.display = !isFound ? '' : 'none';
    });
  }

  function toggleStatus(ip, btn) {
    const row   = btn.closest('tr');
    const state = btn.dataset.state;

    if (state === 'none' || state === 'attack') {
      btn.dataset.state     = 'safe';
      btn.textContent       = 'Safe';
      btn.style.background  = '#3b6d11';
      btn.style.color       = '#fff';
      btn.style.borderColor = '#3b6d11';
      if (row) row.style.background = '#1a2d1a';
      confirmedAttackers.delete(ip);
      markedSafe.add(ip);
    } else {
      btn.dataset.state     = 'attack';
      btn.textContent       = 'Attack';
      btn.style.background  = '#a32d2d';
      btn.style.color       = '#fff';
      btn.style.borderColor = '#a32d2d';
      if (row) row.style.background = '#2d1a1a';
      markedSafe.delete(ip);
      confirmedAttackers.add(ip);
    }
    updateDownloadBtn();
  }

  function copyIP(ip, btn) {
    navigator.clipboard.writeText(ip).then(() => {
      btn.textContent = 'Copied!';
      btn.style.color = '#27500a';
      setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 1500);
    }).catch(() => {
      btn.textContent = 'Failed';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
    });
  }

  function updateDownloadBtn() {
    const btn = document.getElementById('downloadBtn');
    if (!btn) return;
    if (confirmedAttackers.size > 0) {
      btn.style.display = 'inline-block';
      btn.textContent   = `Download confirmed attackers (${confirmedAttackers.size})`;
    } else {
      btn.style.display = 'none';
    }
  }

  function downloadAttackers() {
    if (confirmedAttackers.size === 0) return;
    const content = [...confirmedAttackers].join('\n');
    const blob    = new Blob([content], { type: 'text/plain' });
    const url     = URL.createObjectURL(blob);
    const a       = document.createElement('a');
    a.href        = url;
    a.download    = `confirmed_attackers_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function clearAll() {
    document.getElementById('searchInput').value = '';
    document.getElementById('results').innerHTML = '';
    document.getElementById('metrics').style.display = 'none';
    confirmedAttackers.clear();
    markedSafe.clear();
    updateDownloadBtn();
  }
</script>

</body>
</html>
